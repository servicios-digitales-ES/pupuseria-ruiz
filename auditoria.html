<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle de Pedido — Pupusería Ruiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #111014;
      --surface: #1C1B20;
      --surface2:#26242C;
      --surface3:#312E3A;
      --accent:  #E8541A;
      --accent2: #FF7140;
      --arroz:   #34D399;
      --text:    #F0EEF5;
      --text2:   #A09CB0;
      --text3:   #6B6680;
      --font:    'Plus Jakarta Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 24px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }

    .audit-wrap { width: 100%; max-width: 480px; }

    /* Header */
    .audit-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }
    .audit-logo { font-size: 1.8rem; }
    .audit-brand { font-size: 1rem; font-weight: 800; color: var(--text); }
    .audit-brand span { color: var(--accent2); }

    /* Ticket card */
    .ticket {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--surface2);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    .ticket-top {
      background: var(--accent);
      padding: 24px 24px 20px;
      text-align: center;
    }
    .ticket-top-label {
      font-size: .7rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.7); margin-bottom: 6px;
    }
    .ticket-top-num {
      font-size: 2.4rem; font-weight: 800;
      color: #fff; letter-spacing: -.02em; line-height: 1;
    }
    .ticket-top-fecha {
      font-size: .8rem; color: rgba(255,255,255,.75);
      margin-top: 6px;
    }

    .ticket-seccion {
      padding: 18px 22px;
      border-bottom: 1px solid var(--surface2);
    }
    .ticket-seccion:last-child { border-bottom: none; }

    .ts-titulo {
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--text3); margin-bottom: 12px;
    }

    .ts-fila {
      display: flex; justify-content: space-between;
      align-items: baseline; gap: 8px;
      padding: 5px 0;
      font-size: .88rem; color: var(--text);
    }
    .ts-fila-label { color: var(--text2); font-size: .82rem; }

    /* Tabla de productos */
    .ticket-tabla { width: 100%; border-collapse: collapse; }
    .ticket-tabla th {
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--text3); padding: 0 0 8px;
      text-align: left; border-bottom: 1px solid var(--surface2);
    }
    .ticket-tabla th:last-child,
    .ticket-tabla td:last-child { text-align: right; }
    .ticket-tabla td {
      padding: 9px 0; font-size: .88rem; color: var(--text);
      border-bottom: 1px solid rgba(255,255,255,.04);
      vertical-align: middle;
    }
    .ticket-tabla tr:last-child td { border-bottom: none; }
    .td-cant {
      font-weight: 800; color: var(--accent2);
      width: 30px;
    }
    .td-masa {
      font-size: .72rem; color: var(--text3);
      display: block; margin-top: 1px;
    }
    .td-sub { font-weight: 700; color: var(--accent2); }

    /* Total */
    .ticket-total {
      display: flex; justify-content: space-between; align-items: center;
    }
    .ticket-total-label {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; color: var(--text3);
    }
    .ticket-total-valor {
      font-size: 2rem; font-weight: 800;
      color: var(--arroz); letter-spacing: -.02em;
    }

    /* Estado badge */
    .estado-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 99px;
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .estado-enviado   { background: rgba(232,84,26,.12);  color: var(--accent2); }
    .estado-recibido  { background: rgba(251,191,36,.12); color: #FBBF24; }
    .estado-terminado { background: rgba(52,211,153,.12); color: var(--arroz); }

    /* Acciones */
    .audit-acciones {
      margin-top: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px; border-radius: 12px;
      font-family: var(--font); font-size: .9rem; font-weight: 700;
      cursor: pointer; border: none; text-decoration: none;
      transition: opacity .15s, transform .15s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1.5px solid var(--surface3);
    }

    /* Error / loading */
    .estado-msg {
      text-align: center; padding: 60px 20px;
      color: var(--text3); font-size: .92rem; line-height: 1.6;
    }
    .estado-msg .ico { font-size: 2.5rem; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="audit-wrap">

    <div class="audit-header">
      <span class="audit-logo">🫓</span>
      <div>
        <div class="audit-brand">Pupusería <span>Ruiz</span></div>
        <div style="font-size:.72rem;color:var(--text3);">Comprobante de pedido</div>
      </div>
    </div>

    <div id="contenido"></div>

    <div class="audit-acciones">
      <a href="estado.html" id="btn-estado" class="btn btn-primary" style="display:none">
        📍 Ver estado en vivo
      </a>
      <a href="index.html" class="btn btn-ghost">← Volver al menú</a>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    async function init() {
      const params   = new URLSearchParams(window.location.search);
      const idParam  = params.get('id');
      const contenedor = document.getElementById('contenido');

      // ── Sin ID: mostrar error ──
      if (!idParam) {
        contenedor.innerHTML = `
          <div class="estado-msg">
            <span class="ico">🔍</span>
            No se especificó un pedido.<br>
            Vuelve al menú y realiza tu pedido.
          </div>`;
        return;
      }

      contenedor.innerHTML = `<div class="estado-msg"><span class="ico">⏳</span>Cargando pedido…</div>`;

      try {
        // Intentar cargar desde la API
        const res     = await fetchEstadoPedido(idParam);
        const pedido  = res.pedido;
        const detalle = res.detalle || [];

        if (!pedido) throw new Error('No encontrado');

        renderTicket(contenedor, pedido, detalle);

        const btnEstado = document.getElementById('btn-estado');
        btnEstado.href    = `estado.html?id=${idParam}`;
        btnEstado.style.display = 'flex';

      } catch (err) {
        // Fallback: intentar localStorage (compatibilidad con versión anterior)
        const local = localStorage.getItem('pedido_' + idParam);
        if (local) {
          contenedor.innerHTML = local;
        } else {
          contenedor.innerHTML = `
            <div class="estado-msg">
              <span class="ico">❌</span>
              No se encontró el pedido <strong>#${idParam}</strong>.<br>
              Verifica el número e intenta de nuevo.
            </div>`;
        }
      }
    }

    function renderTicket(contenedor, pedido, detalle) {
      const fecha = pedido.fecha || '—';
      const hora  = pedido.hora  || '—';
      const esDomicilio = pedido.tipo_entrega === 'enviar a domicilio';

      const filas = detalle.map(d => `
        <tr>
          <td class="td-cant">${d.cantidad}</td>
          <td>
            ${d.producto}
            <span class="td-masa">${d.masa}</span>
          </td>
          <td>${formatPrecio(d.precio_unitario)}</td>
          <td class="td-sub">${formatPrecio(d.subtotal)}</td>
        </tr>`).join('');

      const total = detalle.reduce((s, d) => s + (parseFloat(d.subtotal) || 0), 0);

      const estadoClass = {
        enviado:   'estado-enviado',
        recibido:  'estado-recibido',
        terminado: 'estado-terminado',
      }[pedido.estado] || 'estado-enviado';

      const estadoTexto = {
        enviado:   '⏳ Recibido',
        recibido:  '👀 En preparación',
        terminado: '✅ Listo',
      }[pedido.estado] || pedido.estado;

      contenedor.innerHTML = `
        <div class="ticket">

          <div class="ticket-top">
            <div class="ticket-top-label">Pedido</div>
            <div class="ticket-top-num">#${pedido.ID_pedido}</div>
            <div class="ticket-top-fecha">${fecha} · ${hora}</div>
          </div>

          <div class="ticket-seccion">
            <div class="ts-titulo">Estado</div>
            <span class="estado-badge ${estadoClass}">${estadoTexto}</span>
          </div>

          <div class="ticket-seccion">
            <div class="ts-titulo">Cliente</div>
            <div class="ts-fila">
              <span class="ts-fila-label">Nombre</span>
              <span>${pedido.nombre_cliente || '—'}</span>
            </div>
            <div class="ts-fila">
              <span class="ts-fila-label">Entrega</span>
              <span>${pedido.tipo_entrega || '—'}</span>
            </div>
            ${esDomicilio ? `
            <div class="ts-fila">
              <span class="ts-fila-label">Dirección</span>
              <span>${[pedido.casa, pedido.pasaje, pedido.referencia].filter(Boolean).join(', ')}</span>
            </div>` : ''}
          </div>

          <div class="ticket-seccion">
            <div class="ts-titulo">Detalle del pedido</div>
            ${detalle.length > 0 ? `
            <table class="ticket-tabla">
              <thead>
                <tr>
                  <th>Cant.</th>
                  <th>Pupusa</th>
                  <th>Precio</th>
                  <th>Subtotal</th>
                </tr>
              </thead>
              <tbody>${filas}</tbody>
            </table>` : '<p style="color:var(--text3);font-size:.85rem;">Sin detalle disponible.</p>'}
          </div>

          <div class="ticket-seccion">
            <div class="ticket-total">
              <span class="ticket-total-label">Total</span>
              <span class="ticket-total-valor">${formatPrecio(total)}</span>
            </div>
          </div>

        </div>`;
    }

    init();
  </script>
</body>
</html>
