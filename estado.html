<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estado de mi Pedido — Pupusería Ruiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #111014;
      --surface: #1C1B20;
      --surface2:#26242C;
      --surface3:#312E3A;
      --accent:  #E8541A;
      --accent2: #FF7140;
      --arroz:   #34D399;
      --maiz:    #F59E0B;
      --text:    #F0EEF5;
      --text2:   #A09CB0;
      --text3:   #6B6680;
      --font:    'Plus Jakarta Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: rgba(17,16,20,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-logo  { font-size: 1.4rem; }
    .header-nombre { font-size: .95rem; font-weight: 800; }
    .header-live {
      display: flex; align-items: center; gap: 6px;
      font-size: .72rem; color: var(--arroz); font-weight: 600;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--arroz);
      animation: livePulse 1.4s ease infinite;
    }
    @keyframes livePulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.85); }
    }

    /* Layout */
    .page { max-width: 480px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Búsqueda */
    .busqueda {
      background: var(--surface);
      border-radius: 14px; padding: 18px;
      border: 1px solid var(--surface2);
      margin-bottom: 20px;
    }
    .busqueda-label {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--text3); margin-bottom: 10px;
      display: block;
    }
    .busqueda-row { display: flex; gap: 8px; }
    .busqueda-input {
      flex: 1; padding: 11px 14px;
      background: var(--surface2);
      border: 1.5px solid var(--surface3);
      border-radius: 10px; color: var(--text);
      font-family: var(--font); font-size: .93rem;
      outline: none; transition: border-color .15s;
    }
    .busqueda-input:focus { border-color: var(--accent); }
    .busqueda-input::placeholder { color: var(--text3); }
    .busqueda-btn {
      padding: 11px 18px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-family: var(--font); font-size: .88rem; font-weight: 700;
      cursor: pointer; transition: background .15s;
      white-space: nowrap;
    }
    .busqueda-btn:hover { background: var(--accent2); }

    /* Card principal */
    .estado-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--surface2);
      overflow: hidden;
      animation: fadeInUp .22s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ec-top {
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--surface2);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .ec-num-label { font-size: .65rem; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
    .ec-num       { font-size: 2rem; font-weight: 800; color: var(--accent2); letter-spacing: -.02em; line-height: 1.1; }
    .ec-fecha     { font-size: .78rem; color: var(--text3); margin-top: 2px; }

    /* Progress steps */
    .pasos {
      padding: 22px;
      border-bottom: 1px solid var(--surface2);
    }
    .pasos-titulo {
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--text3); margin-bottom: 18px;
    }
    .pasos-track {
      display: flex; align-items: center;
      position: relative;
    }
    .paso {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; position: relative; z-index: 1;
    }
    .paso-circulo {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      background: var(--surface2); border: 2px solid var(--surface3);
      transition: background .3s, border-color .3s;
      margin-bottom: 8px;
    }
    .paso-label {
      font-size: .68rem; font-weight: 600; color: var(--text3);
      text-align: center; line-height: 1.3;
      transition: color .3s;
    }
    .paso-linea {
      position: absolute; top: 18px;
      left: 50%; right: -50%;
      height: 2px; background: var(--surface3);
      z-index: 0; transition: background .3s;
    }
    .paso:last-child .paso-linea { display: none; }

    /* Estados activos */
    .paso.activo .paso-circulo {
      background: var(--accent); border-color: var(--accent);
    }
    .paso.activo .paso-label { color: var(--accent2); font-weight: 700; }
    .paso.completado .paso-circulo {
      background: var(--arroz); border-color: var(--arroz);
    }
    .paso.completado .paso-label { color: var(--arroz); }
    .paso.completado .paso-linea { background: var(--arroz); }

    /* Info del pedido */
    .ec-info { padding: 18px 22px; }
    .ec-info-fila {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 6px 0; font-size: .88rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .ec-info-fila:last-child { border-bottom: none; }
    .ec-info-label { color: var(--text3); font-size: .8rem; }
    .ec-info-valor { font-weight: 600; }

    /* Cola */
    .cola-info {
      margin: 0 22px 18px;
      background: var(--surface2);
      border-radius: 12px; padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border: 1px solid var(--surface3);
    }
    .cola-bloque { text-align: center; }
    .cola-num   { font-size: 1.8rem; font-weight: 800; color: var(--maiz); line-height: 1; }
    .cola-label { font-size: .65rem; color: var(--text3); font-weight: 600; text-transform: uppercase; margin-top: 3px; }
    .cola-sep   { width: 1px; height: 40px; background: var(--surface3); }

    /* Total */
    .ec-total {
      margin: 0 22px 22px;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface2); border-radius: 12px;
      padding: 14px 16px; border: 1px solid var(--surface3);
    }
    .ec-total-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); }
    .ec-total-valor { font-size: 1.6rem; font-weight: 800; color: var(--arroz); }

    /* Acciones */
    .ec-acciones { padding: 0 22px 22px; display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 20px; border-radius: 11px;
      font-family: var(--font); font-size: .88rem; font-weight: 700;
      cursor: pointer; border: none; text-decoration: none;
      transition: opacity .15s, transform .15s;
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1.5px solid var(--surface3);
    }

    /* Terminado banner */
    .banner-listo {
      background: linear-gradient(135deg, rgba(52,211,153,.15), rgba(52,211,153,.05));
      border: 1px solid rgba(52,211,153,.25);
      border-radius: 12px; padding: 16px;
      text-align: center; margin: 0 22px 18px;
    }
    .banner-listo-ico   { font-size: 2rem; margin-bottom: 6px; }
    .banner-listo-texto { font-size: .92rem; font-weight: 700; color: var(--arroz); }
    .banner-listo-sub   { font-size: .78rem; color: var(--text3); margin-top: 3px; }

    /* Mensajes */
    .msg {
      text-align: center; padding: 60px 20px;
      color: var(--text3); font-size: .9rem; line-height: 1.6;
    }
    .msg .ico { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* Actualizando */
    .actualizando {
      text-align: center; font-size: .72rem;
      color: var(--text3); margin-top: 14px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <span class="header-logo">🫓</span>
      <span class="header-nombre">Pupusería Ruiz</span>
    </div>
    <div class="header-live" id="live-indicator" style="display:none">
      <div class="live-dot"></div>
      En vivo
    </div>
  </header>

  <div class="page">
    <!-- Búsqueda por número -->
    <div class="busqueda">
      <label class="busqueda-label" for="input-busqueda">Buscar pedido por número</label>
      <div class="busqueda-row">
        <input class="busqueda-input" id="input-busqueda" type="text" placeholder="Ej: PR-003-20260629"/>
        <button class="busqueda-btn" id="btn-buscar">Buscar</button>
      </div>
    </div>

    <div id="contenido">
      <div class="msg"><span class="ico">📍</span>Ingresa tu número de pedido para ver el estado.</div>
    </div>

    <div class="actualizando" id="actualizando" style="display:none">
      <div class="live-dot"></div>
      Actualizando cada 5 segundos…
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let _idActual   = null;
    let _intervalo  = null;

    async function cargarEstado(id) {
      if (!id) return;
      _idActual = id;

      try {
        const res    = await fetchEstadoPedido(id);
        const pedido = res.pedido;
        const detalle = res.detalle || [];
        if (!pedido) throw new Error('no encontrado');
        renderEstado(pedido, detalle);
        document.getElementById('live-indicator').style.display = 'flex';
        document.getElementById('actualizando').style.display   = 'flex';
      } catch (err) {
        document.getElementById('contenido').innerHTML = `
          <div class="msg">
            <span class="ico">❌</span>
            No se encontró el pedido <strong>${id}</strong>.<br>
            Verifica el número e intenta de nuevo.
          </div>`;
        document.getElementById('live-indicator').style.display = 'none';
        document.getElementById('actualizando').style.display   = 'none';
      }
    }

    function renderEstado(pedido, detalle) {
      const estado    = pedido.estado || 'enviado';
      const esDom     = pedido.tipo_entrega === 'enviar a domicilio';
      const total     = detalle.reduce((s,d) => s + (parseFloat(d.subtotal)||0), 0);
      const terminado = estado === 'terminado';

      // Calcular posición en cola (pedidos enviados anteriores)
      // Aquí simplificado — se puede mejorar con getCola
      const pasoIdx = { enviado: 0, recibido: 1, terminado: 2 }[estado] ?? 0;

      const pasos = [
        { icono: '📥', label: 'Enviado' },
        { icono: '👀', label: 'Recibido' },
        { icono: '✅', label: 'Terminado' },
      ];

      const pasosHtml = pasos.map((p, i) => {
        let clase = '';
        if (i < pasoIdx)  clase = 'completado';
        if (i === pasoIdx) clase = 'activo';
        return `
          <div class="paso ${clase}">
            <div class="paso-circulo">${p.icono}</div>
            <div class="paso-label">${p.label}</div>
            <div class="paso-linea"></div>
          </div>`;
      }).join('');

      const bannerHtml = terminado ? `
        <div class="banner-listo">
          <div class="banner-listo-ico">🎉</div>
          <div class="banner-listo-texto">¡Tu pedido está listo!</div>
          <div class="banner-listo-sub">${esDom ? 'Ya va en camino a tu casa.' : 'Puedes venir a recogerlo.'}</div>
        </div>` : '';

      // Extraer número simple del ID (ej: PR-003-20260629 → #003)
      const numPedido = pedido.ID_pedido
        ? '#' + (pedido.ID_pedido.match(/(\d{3})/) || ['','???'])[1]
        : '#???';

      // Formatear fecha bonita
      let fechaBonita = '';
      try {
        const partes = String(pedido.fecha).split('-');
        if (partes.length === 3) {
          const d = new Date(parseInt(partes[0]), parseInt(partes[1])-1, parseInt(partes[2]));
          fechaBonita = d.toLocaleDateString('es-SV', { weekday:'long', day:'numeric', month:'long' });
        }
      } catch(e) { fechaBonita = pedido.fecha; }

      document.getElementById('contenido').innerHTML = `
        <div class="estado-card">

          <div class="ec-top">
            <div>
              <div class="ec-num-label">Pedido</div>
              <div class="ec-num">${numPedido}</div>
              <div class="ec-fecha">${fechaBonita}${pedido.hora ? ' · ' + pedido.hora : ''}</div>
            </div>
          </div>

          <div class="pasos">
            <div class="pasos-titulo">Progreso</div>
            <div class="pasos-track">${pasosHtml}</div>
          </div>

          ${bannerHtml}

          <div class="ec-info">
            <div class="ec-info-fila">
              <span class="ec-info-label">Cliente</span>
              <span class="ec-info-valor">${pedido.nombre_cliente || '—'}</span>
            </div>
            <div class="ec-info-fila">
              <span class="ec-info-label">Tipo de entrega</span>
              <span class="ec-info-valor">${pedido.tipo_entrega || '—'}</span>
            </div>
            ${esDom && pedido.referencia ? `
            <div class="ec-info-fila">
              <span class="ec-info-label">Referencia</span>
              <span class="ec-info-valor">${pedido.referencia}</span>
            </div>` : ''}
          </div>

          <div class="ec-total">
            <span class="ec-total-label">Total</span>
            <span class="ec-total-valor">${formatPrecio(total)}</span>
          </div>

          <div class="ec-acciones">
            <a href="auditoria.html?id=${pedido.ID_pedido}" class="btn btn-ghost">
              🧾 Ver comprobante completo
            </a>
            <a href="cola.html" class="btn btn-ghost">
              Ver cola pública
            </a>
          </div>

        </div>`;
    }

    function iniciar() {
      const params = new URLSearchParams(window.location.search);
      const id     = params.get('id');

      if (id) {
        document.getElementById('input-busqueda').value = id;
        cargarEstado(id);
        _intervalo = setInterval(() => cargarEstado(_idActual), 5000);
      }
    }

    document.getElementById('btn-buscar').addEventListener('click', () => {
      const val = document.getElementById('input-busqueda').value.trim();
      if (!val) return;
      clearInterval(_intervalo);
      cargarEstado(val);
      _intervalo = setInterval(() => cargarEstado(_idActual), 5000);
      // Actualizar URL sin recargar
      history.replaceState(null, '', `?id=${encodeURIComponent(val)}`);
    });

    document.getElementById('input-busqueda').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-buscar').click();
    });

    iniciar();
  </script>
</body>
</html>
