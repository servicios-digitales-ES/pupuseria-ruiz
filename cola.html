<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cola de Pedidos — Pupusería Ruiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #111014;
      --surface: #1C1B20;
      --surface2:#26242C;
      --surface3:#312E3A;
      --accent:  #E8541A;
      --accent2: #FF7140;
      --arroz:   #34D399;
      --maiz:    #F59E0B;
      --loca:    #A78BFA;
      --text:    #F0EEF5;
      --text2:   #A09CB0;
      --text3:   #6B6680;
      --font:    'Plus Jakarta Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: rgba(17,16,20,.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-logo  { font-size: 1.4rem; }
    .header-nombre { font-size: .95rem; font-weight: 800; }
    .header-sub   { font-size: .7rem; color: var(--text3); margin-top: 1px; }
    .live-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(52,211,153,.08);
      border: 1px solid rgba(52,211,153,.2);
      border-radius: 99px; padding: 5px 12px;
      font-size: .72rem; color: var(--arroz); font-weight: 600;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--arroz);
      animation: livePulse 1.4s ease infinite;
    }
    @keyframes livePulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .3; }
    }

    /* Layout */
    .page { max-width: 700px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Sección títulos */
    .seccion-titulo {
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--text3); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .seccion-titulo::after {
      content: ''; flex: 1; height: 1px;
      background: var(--surface2);
    }
    .seccion-count {
      background: var(--surface2); color: var(--text2);
      font-size: .65rem; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
    }

    /* Grid de cards */
    .cola-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px; margin-bottom: 32px;
    }

    /* Card de pedido */
    .cola-card {
      background: var(--surface);
      border-radius: 14px; padding: 16px;
      border: 1px solid var(--surface2);
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 6px;
      transition: transform .15s, box-shadow .15s;
      animation: fadeInUp .22s ease;
      position: relative; overflow: hidden;
    }
    .cola-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.4); }
    .cola-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
    }
    .cola-card--enviado::before   { background: var(--accent); }
    .cola-card--recibido::before  { background: var(--maiz); }
    .cola-card--terminado::before { background: var(--arroz); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-num {
      font-size: 1.5rem; font-weight: 800;
      letter-spacing: -.02em; line-height: 1;
    }
    .cola-card--enviado   .card-num { color: var(--accent2); }
    .cola-card--recibido  .card-num { color: var(--maiz); }
    .cola-card--terminado .card-num { color: var(--arroz); }

    .card-estado {
      font-size: .62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      padding: 2px 8px; border-radius: 99px;
    }
    .cola-card--enviado   .card-estado { background: rgba(232,84,26,.12);  color: var(--accent2); }
    .cola-card--recibido  .card-estado { background: rgba(245,158,11,.12); color: var(--maiz); }
    .cola-card--terminado .card-estado { background: rgba(52,211,153,.12); color: var(--arroz); }

    .card-hora  { font-size: .72rem; color: var(--text3); }
    .card-espera {
      font-size: .72rem; color: var(--text2); font-weight: 600;
      background: var(--surface2); border-radius: 6px;
      padding: 3px 8px; margin-top: 2px;
    }

    /* Vacía */
    .cola-vacia {
      text-align: center; padding: 50px 20px;
      color: var(--text3);
    }
    .cola-vacia .ico { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    .cola-vacia p    { font-size: .9rem; line-height: 1.6; }

    /* Mi pedido highlight */
    .mi-pedido { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(232,84,26,.25); }
    .mi-pedido-tag {
      position: absolute; top: 26px; right: -18px;
      background: var(--accent); color: #fff;
      font-size: .6rem; font-weight: 800;
      padding: 2px 22px; transform: rotate(45deg);
      white-space: nowrap;
    }

    /* Buscador */
    .mi-pedido-busca {
      background: var(--surface); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 24px;
      border: 1px solid var(--surface2);
      display: flex; align-items: center; gap: 10px;
    }
    .mi-pedido-busca input {
      flex: 1; background: var(--surface2);
      border: 1.5px solid var(--surface3);
      border-radius: 8px; padding: 9px 12px;
      color: var(--text); font-family: var(--font); font-size: .85rem;
      outline: none; transition: border-color .15s;
    }
    .mi-pedido-busca input:focus { border-color: var(--accent); }
    .mi-pedido-busca input::placeholder { color: var(--text3); }
    .mi-pedido-busca button {
      padding: 9px 16px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-family: var(--font);
      font-size: .82rem; font-weight: 700; cursor: pointer;
    }

    /* Footer links */
    .footer-links {
      margin-top: 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .footer-link {
      color: var(--text3); font-size: .8rem; text-decoration: none;
      padding: 7px 14px; border: 1px solid var(--surface2);
      border-radius: 8px; transition: color .15s, border-color .15s;
    }
    .footer-link:hover { color: var(--text); border-color: var(--surface3); }

    /* Última actualización */
    .ultima-actualizacion {
      text-align: center; font-size: .7rem;
      color: var(--text3); margin-top: 16px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <span class="header-logo">🫓</span>
      <div>
        <div class="header-nombre">Pupusería Ruiz</div>
        <div class="header-sub">Cola de pedidos</div>
      </div>
    </div>
    <div class="live-pill">
      <div class="live-dot"></div>
      En vivo
    </div>
  </header>

  <div class="page">

    <!-- Buscar mi pedido -->
    <div class="mi-pedido-busca">
      <input type="text" id="input-mi-pedido" placeholder="Mi número de pedido (ej: PR-20250610-001)"/>
      <button id="btn-mi-pedido">Resaltar</button>
    </div>

    <div id="contenido-cola"></div>

    <div class="ultima-actualizacion" id="ultima-act">—</div>

    <div class="footer-links">
      <a href="estado.html" class="footer-link">📍 Ver estado detallado</a>
      <a href="index.html"  class="footer-link">← Hacer un pedido</a>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    let _miPedido = '';

    async function cargarCola() {
      try {
        const res  = await fetchCola();
        const cola = res.cola || [];
        renderCola(cola);

        const ahora = new Date();
        document.getElementById('ultima-act').textContent =
          `Última actualización: ${ahora.toLocaleTimeString('es-SV', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
      } catch (err) {
        document.getElementById('contenido-cola').innerHTML = `
          <div class="cola-vacia">
            <span class="ico">⚠️</span>
            <p>No se pudo cargar la cola.<br>Reintentando…</p>
          </div>`;
      }
    }

    function renderCola(cola) {
      const contenedor = document.getElementById('contenido-cola');
      if (cola.length === 0) {
        contenedor.innerHTML = `
          <div class="cola-vacia">
            <span class="ico">🫓</span>
            <p>No hay pedidos en este momento.<br>¡Sé el primero en ordenar!</p>
          </div>`;
        return;
      }

      // Separar por estado
      const enviados  = cola.filter(p => p.estado === 'enviado');
      const recibidos = cola.filter(p => p.estado === 'recibido');

      let html = '';

      if (enviados.length > 0) {
        html += `
          <div class="seccion-titulo">
            ⏳ Esperando
            <span class="seccion-count">${enviados.length}</span>
          </div>
          <div class="cola-grid">
            ${enviados.map((p, i) => buildCard(p, i, enviados.length)).join('')}
          </div>`;
      }

      if (recibidos.length > 0) {
        html += `
          <div class="seccion-titulo">
            🔥 En preparación
            <span class="seccion-count">${recibidos.length}</span>
          </div>
          <div class="cola-grid">
            ${recibidos.map(p => buildCard(p, 0, 0)).join('')}
          </div>`;
      }

      contenedor.innerHTML = html;
    }

    function buildCard(pedido, posicion, totalEnCola) {
      const esMio     = _miPedido && pedido.ID_pedido === _miPedido;
      const claseEstado = `cola-card--${pedido.estado}`;
      const estadoTexto = {
        enviado:  'Esperando',
        recibido: 'Preparando',
      }[pedido.estado] || pedido.estado;

      // Solo mostrar el número corto del pedido (ej. "004"), no el ID
      // completo con fecha — antes usaba .split('-').pop(), que tomaba
      // la fecha (el último pedazo) en vez del número.
      const numCorto = (String(pedido.ID_pedido).match(/-(\d{3})-/) || ['', pedido.ID_pedido])[1];

      // Tiempo estimado: posicion * 5 min aprox
      const espera = posicion > 0 ? `~${posicion * 5} min` : 'Próximo';

      return `
        <div class="cola-card ${claseEstado} ${esMio ? 'mi-pedido' : ''}">
          ${esMio ? '<div class="mi-pedido-tag">Mi pedido</div>' : ''}
          <div class="card-num">#${numCorto}</div>
          <div class="card-estado">${estadoTexto}</div>
          <div class="card-hora">${pedido.hora || '—'}</div>
          ${pedido.estado === 'enviado' && posicion >= 0
            ? `<div class="card-espera">${espera}</div>`
            : ''}
        </div>`;
    }

    // Buscar mi pedido
    document.getElementById('btn-mi-pedido').addEventListener('click', () => {
      _miPedido = document.getElementById('input-mi-pedido').value.trim();
      cargarCola();
    });
    document.getElementById('input-mi-pedido').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-mi-pedido').click();
    });

    // Prellenar con el pedido más reciente guardado (ahora ULTIMO_ID
    // guarda una lista en JSON, ya que se puede rastrear más de un
    // pedido a la vez — tomamos el primero, que es el más nuevo).
    function _ultimoIdDeLista() {
      try {
        const raw = typeof lsGet === 'function' ? lsGet(LS.ULTIMO_ID) : '';
        if (!raw) return '';
        if (raw.trim().startsWith('[')) {
          const arr = JSON.parse(raw);
          return Array.isArray(arr) && arr.length ? arr[0] : '';
        }
        return raw; // compatibilidad con el formato viejo (un solo ID)
      } catch (e) { return ''; }
    }

    const ultimoId = _ultimoIdDeLista();
    if (ultimoId) {
      document.getElementById('input-mi-pedido').value = ultimoId;
      _miPedido = ultimoId;
    }

    // Arrancar
    cargarCola();
    setInterval(cargarCola, 5000);
  </script>
</body>
</html>
