<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pupusería Ruiz | Pedidos</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="overlay overlay-left"  id="overlay-left"></div>

<div class="overlay overlay-right" id="overlay-right"></div>

<div class="drawer drawer-left" id="drawer-left">
  <div class="drawer-head">
    <h2>🧾 Menú</h2>
    <button class="drawer-close" id="drawer-left-close" aria-label="Cerrar menú">✕</button>
  </div>
  <div class="drawer-body" id="drawer-left-body">
    </div>
</div>

<div class="drawer drawer-right" id="drawer-right">
  <div class="drawer-head">
    <h2>🧺 Pedido completo</h2>
    <button class="drawer-close" id="drawer-right-close" aria-label="Cerrar pedido">✕</button>
  </div>
  <div class="drawer-body" id="drawer-right-body">
    </div>
  <div class="drawer-footer" id="drawer-footer">
    </div>
</div>

<header>
  <button class="hdr-btn" id="btn-abrir-menu" aria-label="Ver menú de precios">
    <span class="hdr-btn-lines"><span></span><span></span><span></span></span>
    <span class="hdr-btn-label">Menú</span>
  </button>

  <div class="header-title">
    <h1>Pupusería Ruiz</h1>
  </div>

  <button class="hdr-btn hdr-btn-right" id="btn-abrir-pedido" aria-label="Ver pedido completo">
    <span class="hdr-btn-label">Pedido completo</span>
    <span class="hdr-badge" id="hdr-badge"></span>
  </button>
</header>

<div class="toast" id="toast">
  Haz tu pedido tocando los botones del ingrediente que desees y eligiendo tu masa 🫓
</div>

<main>
  <h2 class="section-title"><span>🫓</span> Elige tu pupusa</h2>
  <div class="menu-grid" id="menu-grid">
    </div>
</main>

<div class="modal-overlay" id="modal-loca-overlay">
  <div class="modal modal-loca">
    <div class="modal-head modal-head-loca">
      <h2>🌶️ Pupusa Loca</h2>
      <button class="modal-close" id="modal-loca-close" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body" id="modal-loca-body">
      </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" id="btn-loca-cancel">Cancelar</button>
      <button class="btn-modal-listo"  id="btn-loca-listo">✅ ¡Listo!</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <h2>📋 Confirmar Pedido</h2>
      <button class="modal-close" id="modal-close" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" id="btn-modal-cancel">Cancelar</button>
      <button class="btn-modal-wa"     id="btn-modal-wa">💬 Enviar por WhatsApp</button>
    </div>
  </div>
</div>

<script src="menu.js"></script>
<script src="app.js"></script>
</body>
</html>
