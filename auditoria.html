<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ver Pedido</title>
</head>
<body>
  <div id="contenido-pedido">Cargando pedido...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const contenido = localStorage.getItem('pedido_' + id);
    if (contenido) {
      document.body.innerHTML = contenido;
    } else {
      document.body.innerHTML = "<h1>Error</h1><p>Pedido no encontrado. Intenta de nuevo.</p>";
    }
  </script>
</body>
</html>
